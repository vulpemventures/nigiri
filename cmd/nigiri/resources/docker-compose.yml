name: nigiri
services:
  # RPC daemon
  bitcoin:
    image: ghcr.io/getumbrel/docker-bitcoind:v30.0
    container_name: bitcoin
    user: "${UID:-1000}:${GID:-1000}"
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - 18443:18443
      - 18444:18444
      # ZMQ
      - 28332:28332
      - 28333:28333
    volumes:
      - ./volumes/bitcoin:/data/.bitcoin

  liquid:
    image: ghcr.io/vulpemventures/elements:latest
    container_name: liquid
    user: "${UID:-1000}:${GID:-1000}"
    command:
      - -datadir=config
    ports:
      - 18884:18884
      - 18886:18886
      # ZMQ
      - 38332:38332
      - 38333:38333
    volumes:
      - ./volumes/elements/:/config
    restart: unless-stopped

  # Bitcoin Electrum protocol server
  fulcrum:
    image: cculianu/fulcrum:latest
    container_name: fulcrum
    depends_on:
      - bitcoin
    command:
      - Fulcrum
      - --datadir
      - /data
      - --bitcoind
      - bitcoin:18443
      - --rpcuser
      - admin1
      - --rpcpassword
      - "123"
      - --tcp
      - 0.0.0.0:50001
      - --ws
      - 0.0.0.0:50003
      - --peering
      - "0"
      - --announce
      - "0"
    ports:
      - 50000:50001
      - 50003:50003
    volumes:
      - ./volumes/fulcrum:/data
    restart: unless-stopped

  # MariaDB backing store for mempool-api
  mempool-mariadb:
    image: mariadb:10.5
    container_name: mempool-mariadb
    environment:
      MYSQL_DATABASE: mempool
      MYSQL_USER: mempool
      MYSQL_PASSWORD: mempool
      MYSQL_ROOT_PASSWORD: moneyprintergobrrr
    volumes:
      - ./volumes/mempool-mariadb:/var/lib/mysql
    restart: unless-stopped

  # mempool API — serves esplora-compatible REST under /api/*
  mempool-api:
    image: mempool/backend:v3.2.1
    container_name: mempool-api
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    depends_on:
      - mempool-mariadb
      - fulcrum
      - bitcoin
    command: "./wait-for-it.sh mempool-mariadb:3306 --timeout=720 --strict -- ./start.sh"
    environment:
      # Bitcoin Core RPC (regtest)
      CORE_RPC_HOST: "bitcoin"
      CORE_RPC_PORT: "18443"
      CORE_RPC_USERNAME: "admin1"
      CORE_RPC_PASSWORD: "123"
      CORE_RPC_TIMEOUT: "120000"
      # Electrum backend (Fulcrum)
      MEMPOOL_BACKEND: "electrum"
      ELECTRUM_HOST: "fulcrum"
      ELECTRUM_PORT: "50001"
      ELECTRUM_TLS_ENABLED: "false"
      # Database
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mempool-mariadb"
      DATABASE_PORT: "3306"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      DATABASE_TIMEOUT: "300000"
      # Mempool core
      MEMPOOL_NETWORK: "regtest"
      MEMPOOL_HTTP_PORT: "8999"
      MEMPOOL_CACHE_DIR: "/backend/cache"
      MEMPOOL_CACHE_ENABLED: "true"
      MEMPOOL_INDEXING_BLOCKS_AMOUNT: "-1"
      MEMPOOL_POLL_RATE_MS: "2000"
      MEMPOOL_ALLOW_UNREACHABLE: "true"
      STATISTICS_ENABLED: "false"
      LIGHTNING_ENABLED: "false"
    volumes:
      - ./volumes/mempool-api:/backend/cache
    ports:
      - 8999:8999
    restart: unless-stopped

  # nginx relay: rewrites unprefixed paths to /api/* so chopsticks (and any
  # legacy esplora-style client) keep working unchanged against mempool-api.
  esplora-relay:
    image: nginx:alpine
    container_name: esplora-relay
    depends_on:
      - mempool-api
    volumes:
      - ./volumes/esplora-relay/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 30000:80
    restart: unless-stopped

  electrs-liquid:
    image: ghcr.io/vulpemventures/electrs-liquid:latest
    container_name: electrs-liquid
    entrypoint:
      - /build/electrs
    command:
      - -vvvv
      - --parent-network
      - regtest
      - --network
      - liquidregtest
      - --daemon-dir
      - /config
      - --daemon-rpc-addr
      - liquid:18884
      - --cookie
      - admin1:123
      - --http-addr
      - 0.0.0.0:30001
      - --electrum-rpc-addr
      - 0.0.0.0:50001
      - --cors
      - "*"
      - --jsonrpc-import
    depends_on:
      - liquid
    ports:
      - 50001:50001
      - 30001:30001
    volumes:
      - ./volumes/elements/:/config
    restart: unless-stopped

  # Block explorer frontend (mempool)
  mempool-web:
    image: mempool/frontend:v3.2.1
    container_name: mempool-web
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    depends_on:
      - mempool-api
    command: "./wait-for mempool-mariadb:3306 --timeout=720 -- nginx -g 'daemon off;'"
    environment:
      FRONTEND_HTTP_PORT: "80"
      BACKEND_MAINNET_HTTP_HOST: "mempool-api"
      BACKEND_MAINNET_HTTP_PORT: "8999"
    ports:
      - 5000:80
    restart: unless-stopped

  esplora-liquid:
    image: ghcr.io/vulpemventures/esplora:latest
    container_name: esplora-liquid
    depends_on:
      - chopsticks-liquid
    environment:
      API_URL: http://localhost:3001
    ports:
      - 5001:5000
    restart: unless-stopped

  # Chopsticks
  chopsticks:
    image: ghcr.io/vulpemventures/nigiri-chopsticks:latest
    container_name: chopsticks
    command:
      - --use-faucet
      - --use-mining
      - --use-logger
      - --rpc-addr
      - bitcoin:18443
      - --electrs-addr
      - esplora-relay:80
      - --addr
      - 0.0.0.0:3000
    depends_on:
      - bitcoin
      - esplora-relay
    ports:
      - 3000:3000
    restart: unless-stopped

  chopsticks-liquid:
    image: ghcr.io/vulpemventures/nigiri-chopsticks:latest
    container_name: chopsticks-liquid
    command:
      - --use-faucet
      - --use-mining
      - --use-logger
      - --rpc-addr
      - liquid:18884
      - --electrs-addr
      - electrs-liquid:30001
      - --addr
      - 0.0.0.0:3000
      - --chain
      - liquid
    depends_on:
      - liquid
      - electrs-liquid
    ports:
      - 3001:3000
    restart: unless-stopped

  lnd:
    container_name: lnd
    image: lightninglabs/lnd:v0.19.3-beta
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - bitcoin
    volumes:
      - ./volumes/lnd:/data/.lnd
    environment:
      HOME: /data
    restart: unless-stopped
    stop_grace_period: 5m30s
    ports:
      - "9735:9735" # p2p
      - "10009:10009" # grpc"
      - "18080:18080" # rest"

  tap:
    container_name: tap
    image: lightninglabs/taproot-assets:v0.6.1
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - bitcoin
      - lnd
    volumes:
      - ./volumes/tapd:/data/.tapd
      - ./volumes/lnd:/data/.lnd
    environment:
      HOME: /data
    command:
      - --network=regtest
      - --debuglevel=debug
      - --lnd.host=lnd:10009
      - --lnd.macaroonpath=/data/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      - --lnd.tlspath=/data/.lnd/tls.cert
    restart: unless-stopped
    stop_grace_period: 5m30s
    ports:
      - "10029:10029" # grpc
      - "8089:8089" # rest"

  cln:
    container_name: cln
    image: elementsproject/lightningd:v25.09.3
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      EXPOSE_TCP: "true"
      LIGHTNINGD_NETWORK: regtest
      LIGHTNINGD_DATA: .lightning
    command:
      - --lightning-dir=.lightning
      - --alias=nigiri
      - --bind-addr=0.0.0.0:9935
      - --bitcoin-rpcconnect=bitcoin:18443
      - --bitcoin-rpcpassword=123
      - --bitcoin-rpcuser=admin1
      - --log-level=debug
      - --network=regtest
      - --grpc-host=0.0.0.0
      - --grpc-port=9936
    depends_on:
      - bitcoin
    ports:
      - "9835:9835" # rpc
      - "9935:9935" # p2p
      - "9936:9936" # grpc
    restart: unless-stopped
    volumes:
      - ./volumes/lightningd:/.lightning
      - ./volumes/bitcoin:/etc/bitcoin

  postgres:
    restart: unless-stopped
    image: postgres:16
    ports:
      - 39372:5432
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=arkd
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

  nbxplorer:
    restart: unless-stopped
    expose:
      - "32838"
    depends_on:
      - postgres
      - bitcoin
    image: nicolasdorier/nbxplorer:2.6.0
    environment:
      NBXPLORER_NETWORK: regtest
      NBXPLORER_CHAINS: "btc"
      NBXPLORER_BTCRPCURL: http://bitcoin:18443/
      NBXPLORER_BTCNODEENDPOINT: bitcoin:18444
      NBXPLORER_BTCRPCUSER: admin1
      NBXPLORER_BTCRPCPASSWORD: 123
      NBXPLORER_VERBOSE: 1
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_TRIMEVENTS: 10000
      NBXPLORER_SIGNALFILESDIR: /datadir
      NBXPLORER_POSTGRES: User ID=postgres;Host=postgres;Port=5432;Application Name=nbxplorer;MaxPoolSize=20;Database=nbxplorer
      NBXPLORER_EXPOSERPC: 1
      NBXPLORER_NOAUTH: 1
    volumes:
      - ./volumes/nbxplorer:/datadir
    ports:
      - "32838:32838"

  ark-wallet:
    container_name: ark-wallet
    image: ghcr.io/arkade-os/arkd-wallet:v0.9.3
    restart: unless-stopped
    depends_on:
      - bitcoin
      - nbxplorer
    environment:
      ARKD_WALLET_LOG_LEVEL: "5"
      ARKD_WALLET_NBXPLORER_URL: "http://nbxplorer:32838"
      ARKD_WALLET_NETWORK: "regtest"      
      ARKD_WALLET_SIGNER_KEY: "19422b10efd05403820ff6a3365422be2fc5f07f34a6d1603f7298328f0f80f6"
    volumes:
      - ./volumes/ark/wallet:/app/data
    ports:
      - "6060:6060"

  ark-explorer:
    container_name: ark-explorer
    image: ghcr.io/arklabshq/arkade-explorer:latest
    restart: unless-stopped
    depends_on:
      - ark
    command:
      - sh
      - -c
      - |
        sed -i 's|https://arkade.computer|http://localhost:7070|g' /usr/share/nginx/html/assets/*.js &&
        nginx -g 'daemon off;'
    ports:
      - "7080:80"

  ark:
    container_name: ark
    image: ghcr.io/arkade-os/arkd:v0.9.3
    restart: unless-stopped
    depends_on:
      - bitcoin
      - ark-wallet
      - postgres
    environment:
      ARKD_LOG_LEVEL: "5"
      ARKD_NO_TLS: "true"
      ARKD_NO_MACAROONS: "true"
      ARKD_WALLET_ADDR: "ark-wallet:6060"
      ARKD_ESPLORA_URL: "http://chopsticks:3000"
      ARKD_VTXO_MIN_AMOUNT: "1"
      ARKD_VTXO_TREE_EXPIRY: "1024"
      ARKD_UNILATERAL_EXIT_DELAY: "512"
      ARKD_BOARDING_EXIT_DELAY: "2048"
      ARKD_DB_TYPE: "sqlite"
      ARKD_EVENT_DB_TYPE: "badger"
      ARKD_LIVE_STORE_TYPE: "inmemory"
      ARKD_UNLOCKER_TYPE: "env"
      ARKD_UNLOCKER_PASSWORD: "secret"
    volumes:
      - ./volumes/ark/data:/app/data
    ports:
      - "7070:7070"

networks:
  default:
    name: nigiri
